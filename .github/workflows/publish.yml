name: Publish to npm

# Triggered when you push a tag like v0.1.2, v1.0.0, v1.2.3-beta.1.
# The job typechecks + builds + publishes to npm using the NPM_TOKEN secret.
on:
  push:
    tags:
      - "v*"

# Required permission for the optional GitHub Release creation step below.
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          # Tells setup-node to write an .npmrc that reads NODE_AUTH_TOKEN.

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches the tag
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing v$PKG_VERSION"

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Token-based publish — fall-back while Trusted Publisher debug is in
      # progress. To switch back to OIDC: remove NODE_AUTH_TOKEN below and
      # confirm the npm Trusted Publisher form has the exact repo + workflow
      # filename.
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
